# sysbuild/mcuboot/prj.conf
# MCUboot configuration for nRF7002 DK — SPI NOR external flash (MX25R64)

CONFIG_SIZE_OPTIMIZATIONS=y

# ---------------------------------------------------------------------------
# Multithreading & Logging (Requires 64KB Bootloader Partition)
# ---------------------------------------------------------------------------
CONFIG_MULTITHREADING=y
CONFIG_LOG=y
CONFIG_MCUBOOT_LOG_LEVEL_DBG=y
# Use immediate logging to guarantee we see crashes instantly before reset
CONFIG_LOG_MODE_IMMEDIATE=y

# ---------------------------------------------------------------------------
# Flash & SPI NOR drivers
# ---------------------------------------------------------------------------
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y

# ---------------------------------------------------------------------------
# Stack sizes — SPI NOR driver needs significant stack/ISR space.
# ---------------------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=10240
CONFIG_ISR_STACK_SIZE=4096
CONFIG_MPU_STACK_GUARD=y

# ---------------------------------------------------------------------------
# MCUboot swap strategy — move-based (no scratch partition needed)
# ---------------------------------------------------------------------------
CONFIG_BOOT_UPGRADE_ONLY=n
CONFIG_BOOT_SWAP_USING_MOVE=y
CONFIG_BOOT_MAX_IMG_SECTORS=256
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
