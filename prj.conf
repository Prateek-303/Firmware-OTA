# =============================================================================
# OTA_FIRM — prj.conf
# Board: nRF7002 DK (nRF5340 Application Core)
# SDK:   nRF Connect SDK v3.2.4 / Zephyr v4.2.99
# Mode:  Internal-flash-only OTA via MCUboot overwrite
# =============================================================================

# --- MCUboot and OTA FOTA ---
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH=y

# --- External Flash (SPI NOR) ---
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y

# Phase 3 (Logic only): Enable JSON parsing & CRC checks
CONFIG_CJSON_LIB=y
CONFIG_CRC=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_I2C=y

# --- OTA image count ---
CONFIG_UPDATEABLE_IMAGE_NUMBER=1

# --- Persistent storage (NVS) ---
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --- Watchdog & reboot ---
# --- Watchdog & reboot ---
CONFIG_WATCHDOG=n
CONFIG_REBOOT=y
CONFIG_RESET_ON_FATAL_ERROR=n

# --- Link Time Optimization ---
CONFIG_LTO=n

# --- Logging (Rich logs enabled for Logic debugging) ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- Wi-Fi driver ---
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y

# Disable WPA3 — we use WPA2-PSK only. WPA3 code adds ~15-20 KB.
CONFIG_WIFI_NM_WPA_SUPPLICANT_WPA3=n

# Wi-Fi credentials stored in Kconfig (static, no shell needed).
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="STECH"
CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="$tech1311"

# Wi-Fi ready library: fires wifi_ready_cb() when nRF7002 firmware is ready.
CONFIG_WIFI_READY_LIB=y

# RPU recovery: restarts the nRF7002 if it stops responding.
CONFIG_NRF_WIFI_RPU_RECOVERY=y

# --- Networking core ---
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# --- Connection Manager ---
CONFIG_NET_CONNECTION_MANAGER=y

# --- HTTP/HTTPS client & DNS (Phase 3) ---
CONFIG_HTTP_CLIENT=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_POLL_MAX=10
CONFIG_NET_CONTEXT_SYNC_RECV=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0
CONFIG_NET_MAX_CONTEXTS=5

# --- Secure Sockets (TLS / GitHub HTTPS) ---
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=81920
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_TLS_VERSION_1_2=y
CONFIG_MBEDTLS_MAC_SHA256_ENABLED=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2

# --- Secure Sockets Explicit SNI & Debug ---
CONFIG_MBEDTLS_MPI_MAX_SIZE=512
CONFIG_NET_LOG=n

# --- Network buffer pools (from official NCS STA sample) ---
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NRF70_RX_NUM_BUFS=16

# --- Heap pools ---
# These are RAM values (do not affect flash size) but must be correct for
# the nRF7002 WPA supplicant stack to function reliably.
CONFIG_HEAP_MEM_POOL_SIZE=120000
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=40000

# --- Stack sizes ---
# mbedTLS requires significantly larger stacks for TLS handshake operations.
# TLS certificate verification and key exchange alone can consume 8-10 KB.
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=1
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192

# --- Security ---
CONFIG_NRF_SECURITY=y

# --- POSIX timers (required by WPA supplicant) ---
CONFIG_POSIX_TIMERS=y

# --- Entropy ---
CONFIG_ENTROPY_GENERATOR=y

# --- Code size: CRITICAL ---
# Without SIZE_OPTIMIZATIONS the Wi-Fi stack will not fit the 480 KB slot.
CONFIG_SIZE_OPTIMIZATIONS=y

# Explicitly disable IPv6 (saves ~20 KB of code and RAM)
CONFIG_NET_IPV6=n

# Re-enable printk so we can see the fatal crash dump
CONFIG_PRINTK=y

# Explicitly strip WPA Supplicant internal debug strings (saves ~30+ KB of rodata)
CONFIG_WIFI_NM_WPA_SUPPLICANT_NO_DEBUG=y

# Ensure Asserts are completely compiled out
CONFIG_ASSERT=n
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

CONFIG_HWINFO=y
